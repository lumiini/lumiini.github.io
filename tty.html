<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello</title>
    <style>
        body {
            background-color: #000; /* Black background */
            color: #fff; /* White text */
            font-family: 'Courier New', Courier, monospace; /* Monospace font */
            margin: 0;
            padding: 0 20px; /* Added horizontal padding back for spacing */
            overflow-y: hidden; /* Hide vertical scrollbar */
            height: 100vh; /* Full viewport height */
            box-sizing: border-box;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        body::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        body {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }


        .tty-container {
            width: 100%; /* Use full width */
            /* Removed max-width */
            /* Removed margin: 0 auto; */
        }

        .tty-output {
            white-space: pre-wrap; /* Preserve whitespace and wrap text */
            word-wrap: break-word; /* Break long words */
            margin-bottom: 10px;
            min-height: calc(100vh - 80px); /* Ensure output area takes up most space */
            overflow-y: auto; /* Keep programmatic scrolling */
            height: calc(100vh - 80px); /* Explicit height for scrolling area */
            display: flex; /* Use flexbox for output lines */
            flex-direction: column; /* Stack lines vertically */
        }

         /* Hide scrollbar for tty-output on different browsers */
        .tty-output::-webkit-scrollbar {
            display: none;
        }

        .tty-output {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Style for each output line to use flexbox for alignment */
        .tty-line {
            display: flex;
            justify-content: space-between; /* Push items to the ends */
            width: 100%; /* Take full width of the container */
        }

        .tty-line .message {
            flex-grow: 1; /* Allow message to take available space */
            white-space: pre; /* Preserve spaces in the message */
        }


        .tty-input-line {
            display: flex;
            align-items: center;
        }

        .tty-prompt {
            margin-right: 5px;
            white-space: pre; /* Preserve space in the prompt */
        }

        .tty-input {
            background-color: transparent; /* Transparent background */
            color: #fff; /* White text */
            border: none; /* No border */
            outline: none; /* No outline on focus */
            flex-grow: 1; /* Take up remaining space */
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            caret-color: #fff; /* White cursor */
        }

        /* Hide input lines initially */
        .hidden {
            display: none;
        }

        /* Styles for the colored init status */
        .status-blue {
            color: #6495ED; /* Cornflower Blue - less vibrant */
        }

        .status-green {
            color: #90EE90; /* Light Green - less vibrant */
        }

        /* New style for less vibrant red */
        .status-red-muted {
            color: #CD5C5C; /* IndianRed - less vibrant red */
        }

        /* New style for username color (mix of blue/green approximation) */
        .status-username {
             color: #ADD8E6; /* LightBlue - approximation of blue/green mix */
        }

        /* Styles for Neofetch output layout */
        .neofetch-output {
            display: flex; /* Use flexbox for the two columns */
            margin-bottom: 10px; /* Add some space below neofetch */
        }

        .neofetch-logo {
            white-space: pre; /* Preserve whitespace in ASCII art */
            font-family: 'Courier New', Courier, monospace; /* Ensure monospace font */
            margin-right: 20px; /* Space between logo and info */
            flex-shrink: 0; /* Prevent logo from shrinking */
        }

        .neofetch-info {
             flex-grow: 1; /* Allow info to take available space */
        }

        .neofetch-info p {
            margin: 0; /* Remove default paragraph margin */
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="tty-container">
        <div class="tty-output" id="output"></div>
        <div class="tty-input-line hidden" id="main-input-line">
            <span class="tty-prompt">~ $</span> <input type="text" class="tty-input" id="main-input">
        </div>
    </div>

    <script>
        const outputDiv = document.getElementById('output');
        const mainInput = document.getElementById('main-input');
        const mainInputLine = document.getElementById('main-input-line');

        let uptimeInterval = null; // Variable to hold the uptime interval

        // Function to print text to the output area
        function print(text) {
            outputDiv.innerHTML += text + '\n';
            // Auto-scroll to the bottom
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

         // Function to print a line with optional status aligned to the right
        function printLineWithStatus(message, status = '') {
            const lineElement = document.createElement('div');
            lineElement.classList.add('tty-line');

            const messageSpan = document.createElement('span');
            messageSpan.classList.add('message');
            messageSpan.textContent = message; // Use textContent to avoid interpreting HTML in message

            lineElement.appendChild(messageSpan);

            if (status) {
                const statusSpan = document.createElement('span');
                statusSpan.innerHTML = status; // Use innerHTML for colored status text
                lineElement.appendChild(statusSpan);
            }

            outputDiv.appendChild(lineElement);
            outputDiv.scrollTop = outputDiv.scrollHeight; // Auto-scroll
        }


        // Function to show the main command prompt
        function showMainPrompt() {
            // The prompt is now in the HTML structure, just show the input line
            mainInputLine.classList.remove('hidden'); // Show the main input field
            mainInput.focus(); // Focus the main input field

            // Print the options after the prompt is visible
            // Color the first line green and indent the list items
            print('<span class="status-green">Enter a number (1-6) or the command:</span>'); // Updated prompt text to 1-6
            print("  1) cat lumiini.txt"); // Indented
            print("  2) finnish");         // Indented
            print("  3) homepage");        // Added new option
            print("  4) Startx");          // Updated option number and text
            print("  5) neofetch");        // Added new neofetch option
            print("  6) clear");           // Updated clear option number
        }

        // Function to simulate auto-typing the username directly into the output
        function startAutoLoginTyping(username, callback) {
            let i = 0;
            const loginPromptText = "Login: "; // Capitalized Login
            // Print the initial login prompt text followed by a space
            outputDiv.innerHTML += loginPromptText + ' '; // Added space here as requested

            function typeCharacter() {
                if (i < username.length) {
                    // Append the next character to the last line of the output
                    // This is a simple way to simulate typing on the same line
                    outputDiv.innerHTML = outputDiv.innerHTML.slice(0, -1) + username.charAt(i) + '_'; // Add cursor simulation
                    i++;
                    outputDiv.scrollTop = outputDiv.scrollHeight; // Keep scrolling
                    setTimeout(typeCharacter, 100); // Adjust typing speed here (milliseconds)
                } else {
                    // Typing complete, remove cursor and add a newline
                    outputDiv.innerHTML = outputDiv.innerHTML.slice(0, -1) + '\n'; // Remove cursor and add newline
                    outputDiv.scrollTop = outputDiv.scrollHeight; // Scroll to the end
                    if (callback) {
                        callback(); // Call the next step (handle login)
                    }
                }
            }

            typeCharacter(); // Start typing
        }

        // Function to simulate auto-typing the password (as asterisks) directly into the output
        function startAutoPasswordTyping(passwordLength, callback) {
             let i = 0;
             const passwordPromptText = "Password: ";
             // Print the initial password prompt text on the current line
             outputDiv.innerHTML += passwordPromptText;

             function typeCharacter() {
                 if (i < passwordLength) {
                     // Append the next asterisk to the last line of the output
                     outputDiv.innerHTML = outputDiv.innerHTML.slice(0, -1) + '*' + '_'; // Add cursor simulation
                     i++;
                     outputDiv.scrollTop = outputDiv.scrollHeight; // Keep scrolling
                     setTimeout(typeCharacter, 100); // Adjust typing speed here (milliseconds)
                 } else {
                     // Typing complete, remove cursor and add a newline
                     outputDiv.innerHTML = outputDiv.innerHTML.slice(0, -1) + '\n'; // Remove cursor and add newline
                     outputDiv.scrollTop = outputDiv.scrollHeight; // Scroll to the end
                     if (callback) {
                         callback(); // Call the next step (show main prompt)
                     }
                 }
             }
             // Add initial cursor to the password line
             outputDiv.innerHTML += '_';
             typeCharacter(); // Start typing
         }


        // Function to run the initialization sequence
        function runInitSequence() {
            // Initialization messages
            const initMessages = [
                "* Starting framebuffer ...",
                "* Booting init ...",
                "* Loading HTML core ...",
                "* Initializing filesystem ...",
                "* Starting tty simulation service ...",
                "* Booting complete.", // This message will get the [ success ] status
            ];

            const startedStatusText = '<span class="status-blue">[</span><span class="status-green"> started </span><span class="status-blue">]</span>';
            const successStatusText = '<span class="status-blue">[</span><span class="status-green"> success </span><span class="status-blue">]</span>'; // New success status text

            // Print the "Starting cinit 0.0.2 alpha" message in blue before the init sequence
            print('<span class="status-blue">Starting cinit 0.0.2 alpha</span>');
            print(""); // Add a blank line after the starting message

            let i = 0;
            function displayNextMessage() {
                if (i < initMessages.length) {
                    const message = initMessages[i];
                    let statusToUse = '';

                    // Determine which status to use
                    if (message === "* Booting complete.") {
                        statusToUse = successStatusText;
                    } else { // For other messages
                        statusToUse = startedStatusText;
                    }

                    // Use the function to print message with the determined status
                    printLineWithStatus(message, statusToUse);

                    i++;
                    setTimeout(displayNextMessage, 300); // Adjust delay as needed

                } else {
                    // After init messages, add an extra blank line
                    print(""); // Added extra blank line here
                    // Then display the welcome message
                    print("Welcome to Linus Torvalds' dream!"); // Changed welcome message back
                    print(""); // Add a blank line after the welcome message
                    // Start auto-typing the login directly into the output
                    startAutoLoginTyping("lumiini", handleLoginSuccess); // Call auto-typing, then success handler
                }
            }

            // Start displaying the init messages after a short delay
            setTimeout(displayNextMessage, 500); // Delay before starting init messages
        }

        // Function to handle the successful auto-login (now triggers password typing)
        function handleLoginSuccess() {
            const simulatedPasswordLength = 10; // Length of the password to simulate with asterisks
            startAutoPasswordTyping(simulatedPasswordLength, showLoginSuccessfulAndPrompt);
        }

        // Function to show "Login successful." and then the main prompt
        function showLoginSuccessfulAndPrompt() {
             print("Login successful.");
             print(""); // Add a blank line
             // Directly show the main prompt after successful auto-login
             setTimeout(showMainPrompt, 500); // Delay before showing main prompt
        }

        // Function to simulate neofetch output
        function showNeofetch() {
            // Clear previous neofetch output if any
            if (uptimeInterval) {
                clearInterval(uptimeInterval);
                uptimeInterval = null;
            }

            const logoLines = [
                "             .',;::cc::;',.",
                "           .,',;::clclclclclc::;,.",
                "     .',;::clclclclclclclclclclclclc::;,.",
                "   .',;::clclclclclclclclclclclclclclclclc::;,.",
                "   ;::clclclclclclclclclclclclclclclclclclclclc;",
                "  .clclclclclclclclclclclclclclclclclclclclclclc.",
                "  .clclclclclclclclclclclclclclclclclclclclclclc.",
                "  .clclclclclclclclclclclclclclclcl;::clclclclclc.",
                "  .clclclclclclclclclclclclclclcl;::;::clclclclclc.",
                "  .clclclcl;::clclclclclclclclcl;::;::clclclclclc.",
                "  ;::clclcl;::;::clclclclclclclcl;::;::clclclclclc;",
                "  ;::clclclcl;::;::clclclclclclcl;::;::clclclclclc;",
                "  `::clclclclcl;::;::clclclclclclcl;::;::clclclclc;'",
                "   `.::clclclclclcl;::;::clclclclclcl;::;::clclclc.'",
                "     `.::clclclclclclcl;::;::clclclclclcl;::;',.'",
                "       `.::clclclclclclclcl;::;::clclclcl;','",
                "         `,::clclclclclclclclcl;::;',,'",
                "           `,::clclclclclclcl;','",
                "             `,::clclcl;','",
            ];

            // Simulate uptime
            const startTime = new Date();
            function getUptimeString() {
                const now = new Date();
                const diff = new Date(now - startTime);
                const hours = diff.getUTCHours();
                const minutes = diff.getUTCMinutes();
                const seconds = diff.getUTCSeconds();
                 return `${hours}h ${minutes}m ${seconds}s`;
            }

            // Get browser information
            const userAgent = navigator.userAgent;
            let browserName = "Unknown Browser";
            if (userAgent.match(/firefox|fxios/i)) {
                browserName = "Firefox";
            } else if (userAgent.match(/chrome|chromium|crios/i)) {
                browserName = "Chrome";
            } else if (userAgent.match(/safari/i)) {
                browserName = "Safari";
            } else if (userAgent.match(/edg/i)) {
                browserName = "Edge";
            } else if (userAgent.match(/opr/i)) {
                browserName = "Opera";
            }


            const infoLines = [
                `<span class="status-username">lumiini@tty</span>`, // Color the username
                "-----------------",
                `<span class="status-red-muted">OS:</span> HTML/JS TTY Simulation`, // Color the label
                `<span class="status-red-muted">Kernel:</span> Browser Engine`, // Color the label
                `<span class="status-red-muted">Uptime:</span> <span id="uptime-value">${getUptimeString()}</span>`, // Uptime with a span for updating
                `<span class="status-red-muted">Packages:</span> ∞`, // Color the label
                `<span class="status-red-muted">Shell:</span> TTY`, // Color the label
                `<span class="status-red-muted">Browser:</span> ${browserName}`, // Added browser field
                `<span class="status-red-muted">Resolution:</span> ${window.screen.width}x${window.screen.height}`, // Added resolution
                `<span class="status-red-muted">Viewport:</span> ${window.innerWidth}x${window.innerHeight}`, // Added viewport size

            ];

            // Create a container for the neofetch output
            const neofetchContainer = document.createElement('div');
            neofetchContainer.classList.add('neofetch-output');

            // Create a div for the logo
            const logoElement = document.createElement('div');
            logoElement.classList.add('neofetch-logo');
            logoElement.textContent = logoLines.join('\n'); // Join logo lines with newlines

            // Create a div for the info
            const infoElement = document.createElement('div');
            infoElement.classList.add('neofetch-info');

            // Add each info line to the info div as a paragraph
            infoLines.forEach(line => {
                const p = document.createElement('p');
                p.innerHTML = line; // Use innerHTML to render spans for coloring
                infoElement.appendChild(p);
            });

            // Append the logo and info divs to the container
            neofetchContainer.appendChild(logoElement);
            neofetchContainer.appendChild(infoElement);

            // Append the container to the output area
            outputDiv.appendChild(neofetchContainer);
            outputDiv.scrollTop = outputDiv.scrollHeight; // Auto-scroll

            // Start updating uptime every second
            const uptimeElement = document.getElementById('uptime-value');
            if (uptimeElement) {
                 uptimeInterval = setInterval(() => {
                    uptimeElement.textContent = getUptimeString();
                 }, 1000);
            }

             print(""); // Add a blank line after neofetch output
        }


        // Event listener for the main command input field
        mainInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                const command = mainInput.value.trim();
                // Echo the command with the full prompt
                print("~ $ " + command); // Echo the command with updated prompt

                mainInput.value = ''; // Clear the input field
                // No need to hide the input line, just clear the value
                // mainInputLine.classList.add('hidden'); // Hide input while processing

                // Handle both numeric and command string inputs
                switch (command) {
                    case '1':
                    case 'cat lumiini.txt': // Added case for command string
                        print("Hello");
                        break;
                    case '2':
                    case 'finnish': // Added case for command string
                        print("Hei");
                        break;
                    case '3':
                    case 'homepage': // Added case for new command string
                         print("Redirecting to homepage..."); // Optional message
                         // Hide the input line before redirecting
                         mainInputLine.classList.add('hidden');
                         // Clear uptime interval before redirecting
                         if (uptimeInterval) {
                             clearInterval(uptimeInterval);
                             uptimeInterval = null;
                         }
                         setTimeout(() => {
                             window.location.href = 'https://lumiini.github.io/lumiini'; // Redirect to lumiini.github.io/lumiini
                         }, 1000); // Delay before redirecting
                         break;
                    case '4': // Updated case number
                    case 'Startx': // Added case for command string
                        print("Starting X server..."); // Optional message
                        // Hide the input line before redirecting
                        mainInputLine.classList.add('hidden');
                         // Clear uptime interval before redirecting
                         if (uptimeInterval) {
                             clearInterval(uptimeInterval);
                             uptimeInterval = null;
                         }
                         setTimeout(() => {
                            window.location.href = '/startx/x.html'; // Redirect to the new URL
                         }, 1000); // Delay before redirecting
                        break;
                    case '5': // Case for the new "neofetch" command
                    case 'neofetch': // Added case for command string
                        showNeofetch(); // Call the neofetch function
                        break;
                    case '6': // Updated case number for clear
                    case 'clear': // Added case for command string
                         // Clear uptime interval before clearing output
                         if (uptimeInterval) {
                             clearInterval(uptimeInterval);
                             uptimeInterval = null;
                         }
                        outputDiv.innerHTML = ''; // Clear the output area
                        // After clearing, re-show the main prompt and options
                        showMainPrompt();
                        break;
                    default:
                        print("Invalid input. Please enter 1, 2, 3, 4, 5, 6 or the command."); // Updated error message
                        break;
                }
                // After processing, ensure the input is focused again for the next command
                // This is handled automatically by the input field not being hidden, except for redirects
                if (command !== '3' && command !== 'Startx' && command !== 'homepage') {
                    mainInput.focus();
                }
            }
        });

        // Start the init sequence when the page loads
        window.onload = function() {
            runInitSequence();
        };
    </script>
</body>
</html>
